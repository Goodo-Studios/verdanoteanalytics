name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    # On a push to main, deploy-functions runs too; wait for it so E2E exercises
    # the freshly-deployed edge functions instead of racing the redeploy (which
    # left vault-save-creative cold/mid-swap and timed the save flow out). On
    # PRs deploy-functions is skipped (it is gated to main pushes), so the
    # always() guard keeps E2E running there as long as `check` passed.
    needs: [check, deploy-functions]
    if: ${{ always() && needs.check.result == 'success' }}

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
      PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
      PLAYWRIGHT_CLIENT_EMAIL: ${{ secrets.PLAYWRIGHT_CLIENT_EMAIL }}
      PLAYWRIGHT_CLIENT_PASSWORD: ${{ secrets.PLAYWRIGHT_CLIENT_PASSWORD }}
      PLAYWRIGHT_BASE_URL: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Start preview server
        run: npx vite preview --port 8080 &
        # Give the server a moment to bind before Playwright connects
        # Playwright's built-in webServer config handles this more robustly,
        # but the preview server is fast enough that a short sleep suffices.

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 > /dev/null && break
            sleep 1
          done

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Dump failure DOM snapshots
        if: failure()
        run: |
          echo "===== Playwright failure diagnostics ====="
          shopt -s globstar nullglob
          found=0
          for f in test-results/**/error-context.md; do
            found=1
            echo ""
            echo "----- $f -----"
            cat "$f"
          done
          if [ "$found" = "0" ]; then
            echo "No error-context.md files found under test-results/"
            echo "test-results/ tree:"
            ls -R test-results/ 2>/dev/null || echo "(test-results/ missing)"
          fi
          echo "===== End diagnostics ====="

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy-functions:
    name: Deploy Supabase edge functions
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: bash scripts/deploy-functions.sh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
