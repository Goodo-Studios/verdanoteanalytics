# US-005: one-time backfill re-tag of historical creatives. Invoked manually
# (or by an internal caller) with the service-role bearer — no end-user JWT.
[functions.backfill-retag]
verify_jwt = false

# Phase C US-002: service-role persister for review-mining output. Invoked by
# the HQ review-mining flow with the service-role bearer (+ INGEST_SECRET) —
# no end-user JWT, and a shared-secret guard on top of the gateway bearer.
[functions.ingest-reviews]
verify_jwt = false

# Phase C US-005: service-role persister that writes an HQ-synthesized brief
# into the briefs table as status='draft'. Invoked by the HQ brief-synthesis
# flow with the service-role bearer (+ WRITE_BRIEF_SECRET) — no end-user JWT,
# so a shared-secret guard layers on top of the gateway bearer (mirrors
# ingest-reviews).
[functions.write-brief]
verify_jwt = false

[functions.system-health-check]
verify_jwt = false

# ─── Vault edge functions (ported from Creative Vault, US-002) ───────────────
# User-scoped only — RLS gates by auth.uid() = inspiration_items.user_id.

[functions.vault-save]
verify_jwt = true

[functions.vault-ads]
verify_jwt = true

# vault-extract is invoked internally by vault-save with the service-role bearer
# and never directly from the browser — no JWT verification needed.
[functions.vault-extract]
verify_jwt = false

# Apify webhook receiver — Apify calls this directly, no JWT.
[functions.vault-extract-webhook]
verify_jwt = false

[functions.vault-status]
verify_jwt = true

[functions.vault-search]
verify_jwt = true

# ─── AI analysis edge functions (ported from Creative Vault, US-003) ──────────
# Pipeline: vault-transcribe → vault-analyze (chained via EdgeRuntime.waitUntil),
# with vault-embed run separately for semantic search and vault-frame-analyze
# called from the browser for per-frame visual inspection.

# Transcription with Groq Whisper. Called internally from vault-extract with
# service-role bearer — no end-user JWT.
[functions.vault-transcribe]
verify_jwt = false

# Claude script cleanup + framework extraction + brand metadata. Called
# internally from vault-transcribe with service-role bearer — no end-user JWT.
[functions.vault-analyze]
verify_jwt = false

# OpenAI embeddings (512-dim) over title + framework + transcript. Called
# internally by background triggers — no end-user JWT.
[functions.vault-embed]
verify_jwt = false

# Frame-by-frame Claude vision analysis. Verifies the user JWT inside the
# function (anon-key client) so verify_jwt stays false here.
[functions.vault-frame-analyze]
verify_jwt = false

# ─── Viral feed edge functions (ported from Creative Vault, US-004) ──────────
# Global viral feed — viral_feed_items has no workspace_id column. The weekly
# cron is registered via pg_cron in migration 20260527000003_viral_feed_cron.sql
# (Sunday 07:00 UTC) — same pattern as the rest of the Verdanote cron jobs.
# Secret names mirror Creative Vault verbatim:
#   APIFY_TOKEN, ANTHROPIC_API_KEY, CRON_SERVICE_ROLE_KEY (optional).

# Cron orchestrator — invoked by pg_cron with the service role key.
[functions.vault-viral-cron]
verify_jwt = false

# User-facing viral feed refresh — called from frontend with user JWT, or
# internally by vault-viral-cron with the service role key.
[functions.vault-viral-refresh]
verify_jwt = true

# Apify webhook receiver — Apify calls this directly, no Supabase JWT.
[functions.vault-viral-webhook]
verify_jwt = false

# ─── Slack import edge functions (ported from Creative Vault, US-011) ────────
# slack_connections is user-scoped (auth.uid()) — each user connects their own
# Slack workspace and selects channels to monitor.
# Secret names mirror Creative Vault verbatim:
#   SLACK_CLIENT_ID, SLACK_CLIENT_SECRET, SLACK_SIGNING_SECRET.

# User-facing connect endpoint — called from frontend with the user JWT.
# Validates the bot token via slack.com/api/auth.test and stores the connection.
[functions.vault-slack-connect]
verify_jwt = true

# Slack Events API webhook — Slack calls this directly. Auth is HMAC over the
# X-Slack-Signature header (verified against signing_secret), so no JWT.
[functions.vault-slack-events]
verify_jwt = false

# Backfill a Slack channel's history into the user's vault — called from
# frontend with the user JWT.
[functions.vault-slack-import]
verify_jwt = true
